global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: cicd-app
    metrics_path: /actuator/prometheus
    scrape_interval: 5s
    static_configs:
      - targets: ["app:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node-exporter
    scrape_interval: 5s
    static_configs:
      - targets: ["node-exporter:9100"]
